<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sceglitu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dark.css" id="dark-theme-link">
  <script>
    const darkThemeSaved = localStorage.getItem('sceglitu_theme') || 'dark';
    if (darkThemeSaved !== 'dark') {
      document.getElementById('dark-theme-link')?.setAttribute('disabled', 'disabled');
    }
  </script>
</head>
<body>
  <main class="auth-page">
    <header class="auth-header">
      <a class="back-link" href="index.html">&#8592; Torna alla home</a>
      <h1>Accesso (facoltativo)</h1>
      <p>Puoi registrarti/accedere oppure continuare senza login.</p>
    </header>

    <section class="auth-card">
      <h2>Signup</h2>
      <form id="signup-form" class="auth-form">
        <input id="signup-email" type="email" placeholder="Email" required />
        <input id="signup-password" type="password" placeholder="Password" minlength="6" required />
        <button class="btn-primary" type="submit">Crea account</button>
      </form>
    </section>

    <section class="auth-card">
      <h2>Login</h2>
      <form id="login-form" class="auth-form">
        <input id="login-email" type="email" placeholder="Email" required />
        <input id="login-password" type="password" placeholder="Password" minlength="6" required />
        <button class="btn-primary" type="submit">Entra</button>
      </form>
    </section>

    <a class="auth-link" href="index.html">Continua senza login</a>
    <p id="status" class="status-msg"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://kwytluxudzevpmrunxzx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3eXRsdXh1ZHpldnBtcnVueHp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTI4MzUsImV4cCI6MjA4ODA4ODgzNX0.xHJXX7OzABwJZFcEZnJWj_IaFydH9y5N0fW8drkNswg';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const statusEl = document.getElementById('status');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', isError);
    }

    async function redirectIfLoggedIn() {
      const { data, error } = await client.auth.getSession();
      if (error) {
        setStatus(error.message, true);
        return;
      }
      if (data.session) {
        window.location.replace('profilo.html');
      }
    }

    document.getElementById('signup-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      const { data, error } = await client.auth.signUp({ email, password });
      if (error) {
        setStatus(`Signup fallita: ${error.message}`, true);
        return;
      }

      if (data.session) {
        setStatus('Signup riuscita. Reindirizzamento...');
        window.location.replace('profilo.html');
      } else {
        setStatus('Signup riuscita. Controlla la tua email per la conferma.');
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      const { error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        setStatus(`Login fallita: ${error.message}`, true);
        return;
      }

      setStatus('Login riuscita. Reindirizzamento...');
      window.location.replace('profilo.html');
    });

    redirectIfLoggedIn();
  </script>
</body>
</html>
