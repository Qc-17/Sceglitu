<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Cataloghoo - Lettore .cic</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --bg-primary:#141418; --bg-secondary:#1a1a1e; --bg-tertiary:#252529;
    --bg-quaternary:#3a3a3e; --text-primary:#fff; --text-secondary:#aaa;
    --accent:#2563eb; --accent-hover:#1d4ed8;
}
body.light-theme {
    --bg-primary:#f0f2f5; --bg-secondary:#fff; --bg-tertiary:#e8eaed;
    --bg-quaternary:#d0d3d8; --text-primary:#1a1a1a; --text-secondary:#555;
}
body {
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:var(--bg-primary); color:var(--text-primary);
    min-height:100vh; display:flex; flex-direction:column;
    transition:background .3s;
}
.header {
    display:flex; align-items:center; justify-content:space-between;
    padding:11px 14px; background:var(--bg-secondary); border-radius:10px;
    margin:10px; gap:6px;
}
.header h1 { flex:1; text-align:center; font-size:21px; }
.header-btn { padding:8px 15px; background:var(--accent); color:#fff;
    border:none; border-radius:6px; cursor:pointer; font-size:13px; }
.header-btn:hover { background:var(--accent-hover); }
.theme-toggle { display:flex; gap:3px; background:var(--bg-tertiary); border-radius:17px; padding:3px; }
.theme-toggle button { padding:5px 9px; font-size:14px; background:transparent;
    border:none; border-radius:13px; cursor:pointer; }
.theme-toggle button.active { background:var(--accent); }
.scroll-container { flex:1; overflow-y:auto; padding:0 10px; margin-bottom:5px; }
.catalog-row {
    display:grid; grid-template-columns:33% 22% 11% 20% 14%;
    padding:11px 14px; margin-bottom:4px; border-radius:6px;
    cursor:pointer; transition:transform .15s, filter .15s; font-size:12.5px;
}
.catalog-row:hover { transform:translateX(4px); filter:brightness(1.12); }
.catalog-row > div { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 3px; }
body:not(.light-theme) .tipo-libro { background:#0d0d0d; color:#fff; }
body:not(.light-theme) .tipo-fumetto { background:#cc4c4c; color:#fff; }
body:not(.light-theme) .tipo-rivista { background:#196619; color:#fff; }
body:not(.light-theme) .tipo-cd { background:#262673; color:#fff; }
body:not(.light-theme) .tipo-dvd { background:#737326; color:#fff; }
body:not(.light-theme) .tipo-videocassetta { background:#267373; color:#fff; }
body:not(.light-theme) .tipo-musicassetta { background:#732673; color:#fff; }
body:not(.light-theme) .tipo-altro { background:#404040; color:#fff; }
body.light-theme .tipo-libro { background:#d4d4d4; color:#111; }
body.light-theme .tipo-fumetto { background:#ffb4b4; color:#111; }
body.light-theme .tipo-rivista { background:#b4ffb4; color:#111; }
body.light-theme .tipo-cd { background:#b4b4ff; color:#111; }
body.light-theme .tipo-dvd { background:#ffffb4; color:#111; }
body.light-theme .tipo-videocassetta { background:#b4ffff; color:#111; }
body.light-theme .tipo-musicassetta { background:#ffb4ff; color:#111; }
body.light-theme .tipo-altro { background:#dcdcdc; color:#111; }
.upload-area {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:60px 20px; margin:20px; border-radius:12px;
    background:var(--bg-secondary); border:2px dashed var(--bg-quaternary);
    cursor:pointer; transition:all .3s;
}
.upload-area:hover { border-color:var(--accent); background:var(--bg-tertiary); }
.upload-area.drag-over { border-color:var(--accent); background:var(--bg-tertiary); transform:scale(1.02); }
.upload-icon { font-size:60px; margin-bottom:15px; opacity:.6; }
.upload-text { font-size:18px; font-weight:600; margin-bottom:8px; }
.upload-hint { font-size:13px; color:var(--text-secondary); }
.bottom-bar {
    display:flex; gap:10px; padding:10px; background:var(--bg-secondary);
    border-radius:10px; margin:5px 10px 10px;
}
.bottom-bar button {
    flex:1; padding:12px; background:var(--accent); color:#fff;
    border:none; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600;
}
.bottom-bar button:hover { background:var(--accent-hover); }
.bottom-bar button:disabled { opacity:.4; cursor:not-allowed; }
.modal { display:none; position:fixed; inset:0; z-index:1000;
    background:rgba(0,0,0,.55); align-items:center; justify-content:center; }
.modal.active { display:flex; }
.modal-content { background:var(--bg-secondary); padding:22px; border-radius:12px;
    max-width:500px; width:92%; max-height:85vh; overflow-y:auto; }
.modal-header { font-size:18px; font-weight:bold; margin-bottom:16px; }
.detail-info { background:var(--bg-tertiary); padding:13px; border-radius:8px; margin-bottom:12px; }
.detail-row { display:flex; margin-bottom:7px; font-size:12.5px; }
.detail-row strong { min-width:130px; flex-shrink:0; }
.btn-row { display:flex; gap:8px; margin-top:16px; }
.btn-row button { flex:1; padding:9px; border:none; border-radius:6px;
    cursor:pointer; font-size:13px; color:#fff; }
.btn-secondary { background:var(--bg-quaternary); color:var(--text-primary) !important; }
.pwd-wrap { position:relative; }
.pwd-wrap input { padding-right:34px; width:100%; padding:8px; background:var(--bg-tertiary);
    border:1px solid var(--bg-quaternary); border-radius:6px; color:var(--text-primary); margin:5px 0; }
.pwd-eye { position:absolute; right:9px; top:50%; transform:translateY(-50%);
    cursor:pointer; font-size:15px; user-select:none; }
.stats { display:flex; gap:15px; justify-content:center; padding:15px;
    background:var(--bg-tertiary); border-radius:8px; margin:10px; }
.stat-item { text-align:center; }
.stat-value { font-size:24px; font-weight:bold; color:var(--accent); }
.stat-label { font-size:11px; color:var(--text-secondary); text-transform:uppercase; }
</style>
</head>
<body>

<div class="header">
    <a href="index.html" style="text-decoration:none; color:inherit;">
        <button class="header-btn">← Indietro</button>
    </a>
    <h1>📖 Open Cataloghoo</h1>
    <div class="theme-toggle">
        <button id="darkBtn" class="active" onclick="setTheme('dark')">🌙</button>
        <button id="lightBtn" onclick="setTheme('light')">☀️</button>
    </div>
</div>

<div id="uploadArea" class="upload-area" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📂</div>
    <div class="upload-text">Apri un file .cic</div>
    <div class="upload-hint">Clicca qui o trascina un file .cic per visualizzarlo</div>
    <input type="file" id="fileInput" accept=".cic" style="display:none;">
</div>

<div id="stats" class="stats" style="display:none;">
    <div class="stat-item">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Elementi totali</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="statTypes">0</div>
        <div class="stat-label">Tipologie</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="statOwner">—</div>
    </div>
</div>

<div class="scroll-container" id="catalogContainer"></div>

<div class="bottom-bar">
    <button id="pdfBtn" onclick="downloadPDF()" disabled>📄 Scarica PDF</button>
</div>

<!-- PASSWORD MODAL -->
<div id="passwordModal" class="modal">
<div class="modal-content">
    <div class="modal-header">🔐 File protetto</div>
    <p style="margin-bottom:15px; color:var(--text-secondary);">Questo file .cic è protetto da password.</p>
    <div class="pwd-wrap">
        <input type="password" id="passwordInput" placeholder="Inserisci password">
        <span class="pwd-eye" onclick="togglePassword('passwordInput')">👁️</span>
    </div>
    <div class="btn-row">
        <button class="btn-secondary" onclick="closeModal('passwordModal'); resetUpload()">Annulla</button>
        <button style="background:#2563eb; color:#fff;" onclick="decryptFile()">Sblocca</button>
    </div>
</div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal" class="modal">
<div class="modal-content">
    <div class="modal-header">Dettagli elemento</div>
    <div class="detail-info" id="detailInfo"></div>
    <div class="btn-row">
        <button class="btn-secondary" onclick="closeModal('detailModal')">Chiudi</button>
    </div>
</div>
</div>

<script>
const TIPO_FIELDS = {
    Libro:[
        {key:'titolo',label:'Titolo'},{key:'autore',label:'Autore'},{key:'anno',label:'Anno'},
        {key:'casa',label:'Casa editrice'},{key:'isbn',label:'ISBN'},{key:'genere',label:'Genere'},
        {key:'pagine',label:'Pagine'},{key:'lingua',label:'Lingua'},{key:'stato',label:'Stato'},{key:'note',label:'Note'}
    ],
    Fumetto:[
        {key:'titolo',label:'Titolo serie'},{key:'autore',label:'Autore'},{key:'numero',label:'Numero'},
        {key:'titoloAlbo',label:'Titolo albo'},{key:'anno',label:'Anno'},{key:'casa',label:'Casa editrice'},
        {key:'genere',label:'Genere'},{key:'lingua',label:'Lingua'},{key:'stato',label:'Stato'},{key:'note',label:'Note'}
    ],
    Rivista:[
        {key:'titolo',label:'Nome rivista'},{key:'autore',label:'Redazione'},{key:'numero',label:'Numero'},
        {key:'anno',label:'Anno'},{key:'casa',label:'Casa editrice'},{key:'genere',label:'Genere'},
        {key:'lingua',label:'Lingua'},{key:'stato',label:'Stato'},{key:'note',label:'Note'}
    ],
    CD:[
        {key:'titolo',label:'Album'},{key:'autore',label:'Artista'},{key:'anno',label:'Anno'},
        {key:'casa',label:'Etichetta'},{key:'genere',label:'Genere'},{key:'tracks',label:'Tracce'},
        {key:'durata',label:'Durata'},{key:'lingua',label:'Lingua'},{key:'stato',label:'Stato'},{key:'note',label:'Note'}
    ],
    DVD:[
        {key:'titolo',label:'Titolo'},{key:'autore',label:'Regista'},{key:'anno',label:'Anno'},
        {key:'casa',label:'Distributore'},{key:'genere',label:'Genere'},{key:'durata',label:'Durata'},
        {key:'lingua',label:'Lingua'},{key:'attori',label:'Attori'},{key:'stato',label:'Stato'},{key:'note',label:'Note'}
    ],
    Videocassetta:[
        {key:'titolo',label:'Titolo'},{key:'autore',label:'Regista'},{key:'anno',label:'Anno'},
        {key:'casa',label:'Distributore'},{key:'genere',label:'Genere'},{key:'durata',label:'Durata'},
        {key:'lingua',label:'Lingua'},{key:'attori',label:'Attori'},{key:'stato',label:'Stato'},{key:'note',label:'Note'}
    ],
    Musicassetta:[
        {key:'titolo',label:'Album'},{key:'autore',label:'Artista'},{key:'anno',label:'Anno'},
        {key:'casa',label:'Etichetta'},{key:'genere',label:'Genere'},{key:'tracks',label:'Tracce'},
        {key:'durata',label:'Durata'},{key:'lingua',label:'Lingua'},{key:'stato',label:'Stato'},{key:'note',label:'Note'}
    ],
    Altro:[
        {key:'titolo',label:'Titolo'},{key:'autore',label:'Autore'},{key:'anno',label:'Anno'},
        {key:'casa',label:'Editore'},{key:'genere',label:'Genere'},{key:'lingua',label:'Lingua'},
        {key:'stato',label:'Stato'},{key:'note',label:'Note'}
    ]
};

const MAGIC_STRING = '5EBAF12E';
let catalog = [];
let catalogOwner = '';
let pendingData = null;
let theme = localStorage.getItem('oc_theme') || 'dark';

// TEMA
function setTheme(t){
    theme = t;
    document.body.classList.toggle('light-theme', t==='light');
    document.getElementById('darkBtn').classList.toggle('active', t==='dark');
    document.getElementById('lightBtn').classList.toggle('active', t==='light');
    localStorage.setItem('oc_theme', t);
}
setTheme(theme);

// FILE UPLOAD
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if(files.length) handleFile(files[0]);
});

fileInput.addEventListener('change', e => {
    if(e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file){
    if(!file.name.endsWith('.cic')){ alert('File non valido. Seleziona un file .cic'); return; }
    const reader = new FileReader();
    reader.onload = e => {
        pendingData = e.target.result;
        tryDecrypt('');
    };
    reader.readAsText(file);
}

function tryDecrypt(pwd){
    try {
        if(!pendingData.startsWith(MAGIC_STRING)){ alert('File .cic non valido'); return; }
        const encrypted = pendingData.substring(MAGIC_STRING.length);
        const decrypted = CryptoJS.AES.decrypt(encrypted, pwd);
        const json = decrypted.toString(CryptoJS.enc.Utf8);
        if(!json){ 
            openModal('passwordModal');
            return;
        }
        const data = JSON.parse(json);
        catalog = data.catalog || [];
        displayCatalog();
        closeModal('passwordModal');
    } catch(e){
        if(pwd === '') openModal('passwordModal');
        else alert('Password errata');
    }
}

function decryptFile(){
    const pwd = document.getElementById('passwordInput').value;
    if(!pwd){ alert('Inserisci la password'); return; }
    tryDecrypt(pwd);
}

function displayCatalog(){
    uploadArea.style.display = 'none';
    document.getElementById('stats').style.display = 'flex';
    document.getElementById('pdfBtn').disabled = false;
    
    // Stats
    document.getElementById('statTotal').textContent = catalog.length;
    const types = new Set(catalog.map(i => i.tipologia));
    document.getElementById('statTypes').textContent = types.size;
    document.getElementById('statOwner').textContent = catalogOwner;
    
    // Tabella
    const container = document.getElementById('catalogContainer');
    container.innerHTML = '';
    
    catalog.forEach(item => {
        const row = document.createElement('div');
        row.className = 'catalog-row tipo-' + (item.tipologia||'altro').toLowerCase();
        const anno = (item.anno||'') + (item.ac?' a.C.':'');
        
        let displayTitolo = item.titolo || '';
        if((item.tipologia==='Fumetto'||item.tipologia==='Rivista') && item.numero){
            displayTitolo = `${item.titolo} #${item.numero}`;
            if(item.titoloAlbo) displayTitolo += ` - ${item.titoloAlbo}`;
        }
        
        row.innerHTML = `<div>${displayTitolo}</div><div>${item.autore||''}</div><div>${anno}</div><div>${item.casa||''}</div><div>${item.tipologia||''}</div>`;
        row.onclick = () => showDetail(item);
        container.appendChild(row);
    });
}

function showDetail(item){
    const fields = TIPO_FIELDS[item.tipologia] || TIPO_FIELDS.Altro;
    let html = `<div class="detail-row"><strong>ID:</strong><span>${item.ID}</span></div>`;
    fields.forEach(f => {
        let v = item[f.key] || '';
        if(f.key==='anno' && item.ac) v += ' a.C.';
        if(v) html += `<div class="detail-row"><strong>${f.label}:</strong><span>${v}</span></div>`;
    });
    document.getElementById('detailInfo').innerHTML = html;
    openModal('detailModal');
}

// PDF EXPORT
function downloadPDF(){
    if(!catalog.length){ alert('Catalogo vuoto'); return; }
    if(!window.jspdf){ alert('Libreria PDF non caricata'); return; }
    
    try {
        const {jsPDF} = window.jspdf;
        const doc = new jsPDF();
        const pw = doc.internal.pageSize.width;
        const ph = doc.internal.pageSize.height;
        
        const items = catalog.slice().sort((a,b) => {
            const ta = (a.titolo||'').toLowerCase();
            const tb = (b.titolo||'').toLowerCase();
            return ta < tb ? -1 : ta > tb ? 1 : 0;
        });
        
        let y = 20;
        
        // Header
        doc.setFontSize(20);
        doc.setTextColor(30,30,30);
        doc.text('CATALOGHOO - Open', pw/2, y, {align:'center'});
        y += 10;
        doc.setFontSize(9);
        doc.setTextColor(100,100,100);
        doc.text(`${catalogOwner}  |  ${items.length} elementi  |  ${new Date().toLocaleDateString('it-IT')}`, pw/2, y, {align:'center'});
        y += 10;
        doc.setDrawColor(180);
        doc.line(15, y, pw-15, y);
        y += 10;
        
        // Items (SEMPRE COLORATI)
        items.forEach(item => {
            const fields = TIPO_FIELDS[item.tipologia] || TIPO_FIELDS.Altro;
            const filledFields = [];
            fields.forEach(f => {
                if(f.key === 'titolo') return;
                let val = item[f.key] || '';
                if(f.key === 'anno' && item.ac) val += ' a.C.';
                if(val) filledFields.push({label: f.label, value: val});
            });
            
            const boxHeight = Math.max(25, 15 + (filledFields.length * 5));
            
            if(y + boxHeight + 5 > ph - 15){
                doc.addPage();
                y = 20;
            }
            
            // Colori
            const colors = {
                'Libro': [13,13,13], 'Fumetto': [204,76,76], 'Rivista': [25,102,25],
                'CD': [38,38,115], 'DVD': [115,115,38], 'Videocassetta': [38,115,115],
                'Musicassetta': [115,38,115], 'Altro': [64,64,64]
            };
            const color = colors[item.tipologia] || [64,64,64];
            doc.setFillColor(color[0], color[1], color[2]);
            doc.roundedRect(15, y, pw-30, boxHeight, 3, 3, 'F');
            
            // Testo bianco
            doc.setTextColor(255,255,255);
            doc.setFontSize(11);
            doc.setFont('helvetica','bold');
            
            let displayTitolo = item.titolo || '—';
            if((item.tipologia==='Fumetto'||item.tipologia==='Rivista') && item.numero){
                displayTitolo = `${item.titolo} #${item.numero}`;
                if(item.titoloAlbo) displayTitolo += ` - ${item.titoloAlbo}`;
            }
            doc.text(displayTitolo, 20, y+8);
            
            doc.setFontSize(8);
            doc.setFont('helvetica','normal');
            let line = y+14;
            
            filledFields.forEach(field => {
                doc.setFont('helvetica','bold');
                doc.text(field.label + ': ', 20, line);
                doc.setFont('helvetica','normal');
                const labelWidth = doc.getTextWidth(field.label + ': ');
                doc.text(String(field.value), 20 + labelWidth, line);
                line += 4.5;
            });
            
            y += boxHeight + 4;
        });
        
        // Page numbers
        const totalPages = doc.getNumberOfPages();
        for(let i=1; i<=totalPages; i++){
            doc.setPage(i);
            doc.setFontSize(8);
            doc.setTextColor(150);
            doc.text(`${i} / ${totalPages}`, pw/2, ph-10, {align:'center'});
        }
        
        doc.save('cataloghoo-open.pdf');
    } catch(e){
        alert('Errore: ' + e.message);
    }
}

// UTILS
function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }
function togglePassword(id){ const e=document.getElementById(id); e.type=e.type==='password'?'text':'password'; }
function resetUpload(){ pendingData=null; fileInput.value=''; }
window.onclick = e => { if(e.target.classList.contains('modal')) e.target.classList.remove('active'); };
</script>
</body>
</html>
