<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impostazioni - Sceglitu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dark.css" id="dark-theme-link">
  <script>
    const darkThemeSaved = localStorage.getItem('sceglitu_theme') || 'dark';
    if (darkThemeSaved !== 'dark') {
      document.getElementById('dark-theme-link')?.setAttribute('disabled', 'disabled');
    }
  </script>
</head>
<body>
  <main class="settings-page">
    <header class="settings-header">
      <a class="back-link" href="index.html">&#8592; Torna alla home</a>
      <h1>Impostazioni</h1>
      <p>Gestisci profilo, tema, tutorial e lingua dell'app.</p>
    </header>

    <section class="settings-card">
      <h2>Account</h2>
      <div class="settings-actions">
        <a class="settings-btn" href="profilo.html">🪪 Apri profilo</a>
      </div>
    </section>

    <section class="settings-card">
      <h2>Aspetto</h2>
      <div class="settings-actions">
        <button class="settings-btn" id="theme-toggle" type="button" onclick="toggleTheme()">☾ Tema</button>
      </div>
    </section>

    <section class="settings-card">
      <h2>Lingua</h2>
      <div class="settings-actions inline">
        <button class="settings-btn settings-lang-btn" type="button" onclick="setLanguage('it')">🇮🇹 Italiano</button>
        <button class="settings-btn settings-lang-btn" type="button" onclick="setLanguage('en')">🇬🇧 English</button>
      </div>
    </section>

    <section class="settings-card">
      <h2>Aiuto</h2>
      <div class="settings-actions">
        <button class="settings-btn" type="button" onclick="openTutorial()">? Apri tutorial</button>
      </div>
    </section>
  </main>

  <script>
    function applyTheme(theme) {
      const darkCss = document.getElementById('dark-theme-link');
      if (darkCss) darkCss.disabled = theme !== 'dark';

      const btn = document.getElementById('theme-toggle');
      if (btn) {
        const isDark = theme === 'dark';
        btn.textContent = isDark ? '☀ Tema chiaro' : '☾ Tema scuro';
      }
    }

    function toggleTheme() {
      const currentTheme = localStorage.getItem('sceglitu_theme') || 'dark';
      const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('sceglitu_theme', nextTheme);
      applyTheme(nextTheme);
    }

    function setLanguage(lang) {
      localStorage.setItem('sceglitu_lang', lang);
      document.documentElement.lang = lang;

      document.querySelectorAll('.settings-lang-btn').forEach((btn, idx) => {
        const active = (idx === 0 && lang === 'it') || (idx === 1 && lang === 'en');
        btn.classList.toggle('active', active);
      });
    }

    function openTutorial() {
      window.location.href = 'tutorial.html?manual=1';
    }

    const savedTheme = localStorage.getItem('sceglitu_theme') || 'dark';
    const savedLang = localStorage.getItem('sceglitu_lang') || 'it';
    applyTheme(savedTheme);
    setLanguage(savedLang);
  </script>
</body>
</html>
