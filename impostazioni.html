<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impostazioni - Sceglitu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dark.css" id="dark-theme-link">
  <script>
    const darkThemeSaved = localStorage.getItem('sceglitu_theme') || 'dark';
    if (darkThemeSaved !== 'dark') {
      document.getElementById('dark-theme-link')?.setAttribute('disabled', 'disabled');
    }
  </script>
</head>
<body>
  <main class="settings-page">
    <header class="settings-header">
      <a class="back-link" href="index.html" data-i18n="header.backHome">&#8592; Torna alla home</a>
      <h1 data-i18n="header.title">Impostazioni</h1>
      <p data-i18n="header.subtitle">Gestisci profilo, tema, tutorial e lingua dell'app.</p>
    </header>

    <section class="settings-card">
      <h2 data-i18n="account.title">Account</h2>
      <div class="settings-actions">
        <a class="settings-btn" href="profilo.html" data-i18n="account.openProfile">🪪 Apri profilo</a>
      </div>
    </section>

    <section class="settings-card">
      <h2 data-i18n="appearance.title">Aspetto</h2>
      <div class="settings-actions">
        <button class="settings-btn" id="theme-toggle" type="button" onclick="toggleTheme()">☾ Tema</button>
      </div>
    </section>

    <section class="settings-card">
      <h2 data-i18n="language.title">Lingua</h2>
      <div class="settings-actions inline">
        <button class="settings-btn settings-lang-btn" type="button" onclick="setLanguage('it')">🇮🇹 Italiano</button>
        <button class="settings-btn settings-lang-btn" type="button" onclick="setLanguage('en')">🇬🇧 English</button>
      </div>
    </section>

    <section class="settings-card">
      <h2 data-i18n="help.title">Aiuto</h2>
      <div class="settings-actions">
        <button class="settings-btn" type="button" onclick="openTutorial()" data-i18n="help.openTutorial">? Apri tutorial</button>
      </div>
    </section>
  </main>

  <script>
    const I18N = {
      it: {
        pageTitle: 'Impostazioni - Sceglitu',
        header: { backHome: '← Torna alla home', title: 'Impostazioni', subtitle: 'Gestisci profilo, tema, tutorial e lingua dell\'app.' },
        account: { title: 'Account', openProfile: '🪪 Apri profilo' },
        appearance: { title: 'Aspetto', darkTheme: '☾ Tema scuro', lightTheme: '☀ Tema chiaro' },
        language: { title: 'Lingua' },
        help: { title: 'Aiuto', openTutorial: '? Apri tutorial' }
      },
      en: {
        pageTitle: 'Settings - Sceglitu',
        header: { backHome: '← Back to home', title: 'Settings', subtitle: 'Manage profile, theme, tutorial, and app language.' },
        account: { title: 'Account', openProfile: '🪪 Open profile' },
        appearance: { title: 'Appearance', darkTheme: '☾ Dark theme', lightTheme: '☀ Light theme' },
        language: { title: 'Language' },
        help: { title: 'Help', openTutorial: '? Open tutorial' }
      }
    };

    let currentLang = localStorage.getItem('sceglitu_lang') || 'it';

    function t(path) {
      return path.split('.').reduce((obj, key) => obj?.[key], I18N[currentLang])
        ?? path.split('.').reduce((obj, key) => obj?.[key], I18N.it)
        ?? path;
    }

    function applyTheme(theme) {
      const darkCss = document.getElementById('dark-theme-link');
      if (darkCss) darkCss.disabled = theme !== 'dark';

      const btn = document.getElementById('theme-toggle');
      if (btn) {
        const isDark = theme === 'dark';
        btn.textContent = isDark ? t('appearance.lightTheme') : t('appearance.darkTheme');
      }
    }

    function toggleTheme() {
      const currentTheme = localStorage.getItem('sceglitu_theme') || 'dark';
      const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('sceglitu_theme', nextTheme);
      applyTheme(nextTheme);
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang;
      document.title = t('pageTitle');
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.innerHTML = t(el.getAttribute('data-i18n'));
      });
    }

    function setLanguage(lang) {
      currentLang = I18N[lang] ? lang : 'it';
      localStorage.setItem('sceglitu_lang', currentLang);

      document.querySelectorAll('.settings-lang-btn').forEach((btn, idx) => {
        const active = (idx === 0 && currentLang === 'it') || (idx === 1 && currentLang === 'en');
        btn.classList.toggle('active', active);
      });

      applyLanguage();
      applyTheme(localStorage.getItem('sceglitu_theme') || 'dark');
    }

    function openTutorial() {
      window.location.href = 'tutorial.html?manual=1';
    }

    const savedTheme = localStorage.getItem('sceglitu_theme') || 'dark';
    setLanguage(currentLang);
    applyTheme(savedTheme);
  </script>
</body>
</html>
