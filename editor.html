<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Story Editor PRO - Sceglitu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
 :root {
  --cream: #f5f0e8;
  --paper: #faf7f2;
  --ink: #1a1208;
  --ink-soft: #4a3f2f;
  --ink-faint: #9a8e7e;
  --amber: #c8832a;
  --amber-dark: #a06820;
  --amber-pale: #f5e6cc;
  --rust: #a84632;
  --sage: #4a7c59;
  --shadow: rgba(26,18,8,0.12);
  --border: rgba(26,18,8,0.12);

  --bg: var(--cream);
  --surface: var(--paper);
  --surface2: #f2ebe0;
  --accent: var(--amber);
  --accent2: var(--amber-dark);
  --accent-muted: rgba(200,131,42,0.15);
  --accent-dim: rgba(200,131,42,0.45);
  --text: var(--ink);
  --text2: var(--ink-soft);
  --text3: var(--ink-faint);
  --ok: var(--sage);
  --ok-bg: rgba(74,124,89,0.12);
  --warn: var(--amber-dark);
  --warn-bg: rgba(200,131,42,0.15);
  --danger: var(--rust);
  --danger-bg: rgba(168,70,50,0.12);
  --info: var(--amber);
  --info-bg: rgba(200,131,42,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; max-width: 1200px; width: 100%; margin: 0 auto; }

/* ── TOP BAR ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  box-shadow: 0 2px 8px var(--shadow);
}
#topbar h1 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  margin-right: 8px;
  white-space: nowrap;
}
#topbar h1 span { color: var(--amber); }
.topbar-meta {
  display: flex;
  gap: 8px;
  flex: 1;
  min-width: 200px;
}
.topbar-meta input {
  background: var(--surface2);
  border: none;
  border-radius: 12px;
  padding: 9px 12px;
  color: var(--text);
  font-size: 14px;
  flex: 1;
}
.topbar-meta input::placeholder { color: var(--text3); }
.topbar-actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: none; border-radius: 9px; padding: 8px 14px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-accent { background: linear-gradient(90deg,var(--accent),var(--accent2)); color: white; }
.btn-surface { background: var(--surface2); color: var(--text); border: none; }
.btn-ok { background: var(--ok-bg); color: var(--ok); border: 1px solid rgba(92,191,133,.3); }
.btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(224,92,92,.3); }
.btn-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid rgba(245,158,11,.3); }
.btn-info { background: var(--info-bg); color: var(--info); border: 1px solid rgba(96,165,250,.3); }
.btn-ghost { background: var(--surface2); color: var(--text2); border: none; }
.btn-ghost:hover { opacity: .8; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 7px; }

/* ── TAB BAR ── */
#tabbar {
  display: flex;
  gap: 4px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 9px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; color: var(--text2);
  border: 1px solid transparent;
  transition: all .15s;
}
.tab:hover { background: var(--surface2); }
.tab.active { background: var(--accent-muted); color: var(--accent); border-color: var(--accent-dim); }
.tab .badge {
  background: var(--danger);
  color: white;
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 10px;
  display: none;
}
.tab .badge.show { display: inline; }

/* ── PANELS ── */
#panels { flex: 1; overflow: hidden; display: flex; }
.panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.panel.active { display: flex; }

/* ── EDITOR PANEL ── */
#editor-panel { overflow-y: auto; padding: 16px; gap: 12px; }

/* ── SEARCH BAR ── */
#searchbar {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#searchbar input {
  flex: 1;
  background: var(--surface2);
  border: none;
  border-radius: 12px;
  padding: 9px 12px;
  color: var(--text);
  font-size: 13px;
}
#searchbar input::placeholder { color: var(--text3); }
#search-count { font-size: 12px; color: var(--text3); white-space: nowrap; min-width: 60px; }

/* ── PAGE CARD ── */
.page-card {
  background: var(--surface);
  border-radius: 18px;
  padding: 15px;
  border: 2px solid transparent;
  box-shadow: 0 2px 8px var(--shadow);
  transition: border-color .2s;
  position: relative;
  margin-bottom: 2px;
}
.page-card.status-ok  { border-color: var(--ok); }
.page-card.status-warn { border-color: var(--warn); }
.page-card.status-err  { border-color: var(--danger); }
.page-card.drag-over  { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-muted); }
.page-card.search-hidden { display: none; }
.page-card.search-match .page-text { border-color: var(--accent-dim); }

.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.page-num-badge {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent-muted);
  border: 1px solid var(--accent-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--accent);
  flex-shrink: 0;
}
.status-pill {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
}
.drag-handle {
  margin-left: auto;
  cursor: grab;
  color: var(--text3);
  font-size: 18px;
  user-select: none;
  padding: 4px;
}
.drag-handle:active { cursor: grabbing; }
.card-actions { display: flex; gap: 4px; }

.page-text {
  width: 100%;
  background: var(--surface2);
  border: none;
  border-radius: 12px;
  padding: 12px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  resize: none;
  font-family: inherit;
  min-height: 72px;
  margin-bottom: 10px;
}
.page-text:focus { outline: none; }

/* ── CHOICES ── */
.choices-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 6px;
}
.choice {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  background: var(--surface2);
  border: none;
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 10px;
}
.choice-arrow { color: var(--accent2); font-size: 14px; margin-top: 8px; flex-shrink: 0; }
.choice-fields { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.choice-text {
  width: 100%;
  background: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  margin: 0;
}
.choice-target-row { display: flex; align-items: center; gap: 6px; }
.choice-target-label { font-size: 12px; color: var(--text3); }
.choice-target {
  width: 72px;
  background: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 8px 10px;
  color: var(--accent2);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  font-family: inherit;
  margin: 0;
}
.choice-target.broken { color: var(--danger); }
.choice-target:focus, .choice-text:focus { outline: none; }

/* ── ADD PAGE ── */
#add-page-btn {
  width: 100%;
  padding: 16px;
  margin-top: 4px;
  border-radius: 18px;
  background: var(--accent);
  border: none;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity .15s;
  box-shadow: 0 8px 20px rgba(99,102,241,0.35);
}
#add-page-btn:hover { opacity: .9; }

/* ── GRAPH PANEL ── */
#graph-panel {
  position: relative;
  background: var(--bg);
  max-width: 100%;
}

#graph-canvas {
  width: 100%;
  height: 100%;
  cursor: grab;
  display: block;
}
#graph-canvas:active { cursor: grabbing; }
#graph-controls {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#graph-legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: var(--surface);
  border: none;
  border-radius: 14px;
  padding: 10px 14px;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.legend-item { display: flex; align-items: center; gap: 8px; color: var(--text2); }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
#graph-tooltip {
  position: absolute;
  background: var(--surface);
  border: none;
  border-radius: 14px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text);
  pointer-events: none;
  display: none;
  max-width: 220px;
  line-height: 1.5;
  z-index: 10;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
#graph-info {
  position: absolute;
  top: 12px;
  left: 12px;
  background: var(--surface);
  border: none;
  border-radius: 14px;
  padding: 10px 16px;
  font-size: 12px;
  color: var(--text2);
  display: flex;
  gap: 16px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.graph-stat { display: flex; flex-direction: column; align-items: center; }
.graph-stat b { font-size: 16px; color: var(--text); }

/* ── JSON PANEL ── */
#json-panel { overflow: hidden; }
#json-toolbar {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: center;
  flex-shrink: 0;
}
#json-output {
  flex: 1;
  background: var(--bg);
  border: none;
  padding: 16px;
  color: var(--text);
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.7;
  overflow-y: auto;
  white-space: pre;
  outline: none;
  resize: none;
  width: 100%;
}

/* ── STATS PANEL ── */
#stats-panel { overflow-y: auto; padding: 20px; gap: 16px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.stat-card {
  background: var(--surface);
  border: none;
  border-radius: 18px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  box-shadow: 0 2px 8px var(--shadow);
}
.stat-card .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
.stat-card .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
.stat-card .stat-sub { font-size: 12px; color: var(--text2); }
.issues-list { display: flex; flex-direction: column; gap: 8px; }
.issue-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--surface);
  border: none;
  border-radius: 14px;
  padding: 12px;
  font-size: 13px;
  cursor: pointer;
  transition: opacity .15s;
  box-shadow: 0 1px 4px var(--shadow);
}
.issue-item:hover { opacity: .8; }
.issue-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.issue-dot.err { background: var(--danger); }
.issue-dot.warn { background: var(--warn); }
.issue-text { flex: 1; color: var(--text2); line-height: 1.5; }
.section-title { font-size: 15px; font-weight: 700; color: var(--accent2); margin-bottom: 8px; }

/* ── MODALS ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: none;
  border-radius: 18px;
  padding: 20px;
  width: 100%;
  max-width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 4px 20px var(--shadow);
}
.modal h2 { font-size: 18px; color: var(--text); }
.modal label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; display: block; }
.modal input, .modal textarea, .modal select {
  width: 100%;
  background: var(--surface2);
  border: none;
  border-radius: 12px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  margin-top: 4px;
  margin-bottom: 4px;
}
.modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.modal-row { display: flex; gap: 10px; }
.modal-row > * { flex: 1; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface);
  border: none;
  border-radius: 14px;
  padding: 12px 22px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  z-index: 200;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  box-shadow: 0 4px 16px var(--shadow);
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.ok { border-left: 3px solid var(--ok); }
#toast.err { border-left: 3px solid var(--danger); }


/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  #app { max-width: 100%; }
  #topbar { padding: 12px; gap: 8px; }
  #topbar h1 { width: 100%; font-size: 21px; }
  .topbar-meta { width: 100%; min-width: 0; }
  .topbar-meta input { min-width: 0; }
  .topbar-actions { width: 100%; }
  .topbar-actions .btn { flex: 1; justify-content: center; }
  #tabbar { overflow-x: auto; padding: 8px 12px; }
  .tab { white-space: nowrap; flex-shrink: 0; }
  #searchbar { padding: 10px 12px; flex-wrap: wrap; }
  #searchbar input { min-width: 180px; }
  #search-count { order: 3; width: 100%; }
  #editor-panel { padding: 12px; }
  .page-card { padding: 12px; border-radius: 14px; }
  .card-header { flex-wrap: wrap; }
  #graph-info { gap: 10px; padding: 8px 10px; }
  .graph-stat b { font-size: 14px; }
}

@media (max-width: 640px) {
  #topbar { position: sticky; top: 0; z-index: 20; }
  .topbar-meta { flex-direction: column; }
  .topbar-meta input,
  #searchbar input,
  .choice-target { width: 100%; }
  #searchbar .btn { width: 100%; justify-content: center; }
  .choice { flex-wrap: wrap; }
  .choice-arrow { margin-top: 2px; }
  .choice-fields { width: 100%; }
  .card-actions { width: 100%; justify-content: flex-end; }
  #graph-controls { top: auto; bottom: 12px; right: 12px; }
  #graph-legend { left: 8px; right: 8px; bottom: 8px; font-size: 11px; }
  #graph-info { left: 8px; right: 8px; top: 8px; justify-content: space-between; }
  .modal { padding: 16px; border-radius: 14px; }
  .modal-row { flex-direction: column; }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

<!-- ── TOP BAR ── -->
<div id="topbar">
  <h1>Story Editor <span>PRO</span></h1>
  <div class="topbar-meta">
    <input id="f-titolo" placeholder="Titolo storia" oninput="onMeta()">
    <input id="f-autore" placeholder="Autore" oninput="onMeta()" style="max-width:140px">
    <input id="f-anno" placeholder="Anno" oninput="onMeta()" type="number" min="0" style="max-width:110px">
    <input id="f-genere" placeholder="Genere" oninput="onMeta()" style="max-width:150px">
    <input id="f-lingua" placeholder="Lingua" oninput="onMeta()" style="max-width:130px">
  </div>
  <div class="topbar-actions">
    <button class="btn btn-surface btn-sm" onclick="openImport()">⬆ Importa</button>
    <button class="btn btn-ok btn-sm" onclick="downloadJSON()">⬇ Salva JSON</button>
  </div>
</div>

<!-- ── TAB BAR ── -->
<div id="tabbar">
  <div class="tab active" onclick="switchTab('editor')" id="tab-editor">✏️ Editor</div>
  <div class="tab" onclick="switchTab('graph')" id="tab-graph">🔀 Grafo</div>
  <div class="tab" onclick="switchTab('json')" id="tab-json">{ } JSON</div>
  <div class="tab" onclick="switchTab('stats')" id="tab-stats">
    📊 Analisi <span class="badge" id="issues-badge">0</span>
  </div>
</div>

<!-- ── PANELS ── -->
<div id="panels">

  <!-- EDITOR -->
  <div class="panel active" id="editor-panel-wrap">
    <div id="searchbar">
      <span style="font-size:13px;color:var(--text3)">🔍</span>
      <input id="search-input" placeholder="Cerca nel testo delle pagine…" oninput="doSearch()">
      <span id="search-count"></span>
      <button class="btn btn-surface btn-sm" onclick="openFindReplace()">Sostituisci</button>
    </div>
    <div id="editor-panel">
      <!-- cards injected here -->
      <button id="add-page-btn" onclick="addPage()">＋ Aggiungi pagina</button>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="panel" id="graph-panel">
    <canvas id="graph-canvas"></canvas>
    <div id="graph-info">
      <div class="graph-stat"><b id="g-pages">0</b><span>Pagine</span></div>
      <div class="graph-stat"><b id="g-choices">0</b><span>Scelte</span></div>
      <div class="graph-stat"><b id="g-ends">0</b><span>Finali</span></div>
      <div class="graph-stat"><b id="g-broken">0</b><span>Rotti</span></div>
    </div>
    <div id="graph-controls">
      <button class="btn btn-surface btn-sm" onclick="graphZoomIn()">＋</button>
      <button class="btn btn-surface btn-sm" onclick="graphZoomOut()">－</button>
      <button class="btn btn-surface btn-sm" onclick="graphReset()">⌖</button>
      <button class="btn btn-accent btn-sm" onclick="graphLayout()">⟳ Layout</button>
    </div>
    <div id="graph-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Valida</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Finale</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Link rotto</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div>Pagina 1</div>
    </div>
    <div id="graph-tooltip"></div>
  </div>

  <!-- JSON -->
  <div class="panel" id="json-panel">
    <div id="json-toolbar">
      <span style="font-size:13px;color:var(--text2);flex:1">Anteprima JSON — seleziona per copiare</span>
      <button class="btn btn-surface btn-sm" onclick="copyJson()">📋 Copia tutto</button>
      <button class="btn btn-ok btn-sm" onclick="downloadJSON()">⬇ Scarica</button>
    </div>
    <textarea id="json-output" readonly spellcheck="false"></textarea>
  </div>

  <!-- STATS -->
  <div class="panel" id="stats-panel">
    <div class="section-title">Statistiche</div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-title" style="margin-top:8px">Problemi rilevati</div>
    <div class="issues-list" id="issues-list"></div>
  </div>

</div>
</div><!-- #app -->

<!-- ── MODALS ── -->

<!-- Import -->
<div class="modal-overlay" id="modal-import">
  <div class="modal">
    <h2>⬆ Importa storia</h2>
    <div>
      <label>File JSON</label>
      <input type="file" accept=".json" id="import-file" onchange="doImport(event)">
    </div>
    <div style="color:var(--text3);font-size:13px">oppure incolla il JSON direttamente:</div>
    <div>
      <label>JSON</label>
      <textarea id="import-json" rows="8" placeholder='{"titolo":"...","autore":"...","anno":2026,"genere":"...","lingua":"...","pagine":[...]}'></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-import')">Annulla</button>
      <button class="btn btn-accent" onclick="doImportJson()">Importa</button>
    </div>
  </div>
</div>

<!-- Find & Replace -->
<div class="modal-overlay" id="modal-findreplace">
  <div class="modal">
    <h2>🔍 Trova e sostituisci</h2>
    <div>
      <label>Cerca</label>
      <input id="fr-find" placeholder="Testo da cercare…">
    </div>
    <div>
      <label>Sostituisci con</label>
      <input id="fr-replace" placeholder="Testo sostitutivo…">
    </div>
    <div id="fr-preview" style="font-size:13px;color:var(--text3)"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-findreplace')">Chiudi</button>
      <button class="btn btn-warn" onclick="doFindReplace(true)">Anteprima</button>
      <button class="btn btn-accent" onclick="doFindReplace(false)">Sostituisci tutto</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════

const uiLang = localStorage.getItem('sceglitu_lang') || 'it';
document.documentElement.lang = uiLang;

const I18N = {
  it: {searchFound:'trovate',deletePage:'Eliminare pagina',pageDuplicated:'Pagina duplicata ✓',jsonCopied:'JSON copiato negli appunti ✓',fileDownloaded:'File scaricato ✓',storyImported:'Storia importata ✓',invalidJson:'JSON non valido: ',importMissingPages:'"pagine" mancante'},
  en: {searchFound:'found',deletePage:'Delete page',pageDuplicated:'Page duplicated ✓',jsonCopied:'JSON copied to clipboard ✓',fileDownloaded:'File downloaded ✓',storyImported:'Story imported ✓',invalidJson:'Invalid JSON: ',importMissingPages:'"pagine" missing'}
};

function txt(key){ return (I18N[uiLang] || I18N.it)[key] || key; }


let pages = JSON.parse(localStorage.getItem('sep_pages') || '[]');
let titolo = localStorage.getItem('sep_titolo') || '';
let autore = localStorage.getItem('sep_autore') || '';
let anno = localStorage.getItem('sep_anno') || '';
let genere = localStorage.getItem('sep_genere') || '';
let lingua = localStorage.getItem('sep_lingua') || '';

// init fields
document.getElementById('f-titolo').value = titolo;
document.getElementById('f-autore').value = autore;
document.getElementById('f-anno').value = anno;
document.getElementById('f-genere').value = genere;
document.getElementById('f-lingua').value = lingua;

// ── Persist ──────────────────────────────────────────────────────────────

function save() {
  localStorage.setItem('sep_pages', JSON.stringify(pages));
  localStorage.setItem('sep_titolo', titolo);
  localStorage.setItem('sep_autore', autore);
  localStorage.setItem('sep_anno', anno);
  localStorage.setItem('sep_genere', genere);
  localStorage.setItem('sep_lingua', lingua);
}

function onMeta() {
  titolo = document.getElementById('f-titolo').value;
  autore = document.getElementById('f-autore').value;
  anno = document.getElementById('f-anno').value;
  genere = document.getElementById('f-genere').value;
  lingua = document.getElementById('f-lingua').value;
  save();
}

// ═══════════════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════════════

let currentTab = 'editor';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab === 'editor' ? 'editor-panel-wrap' : tab + '-panel').classList.add('active');

  if (tab === 'graph') { renderGraph(); }
  if (tab === 'json') { renderJson(); }
  if (tab === 'stats') { renderStats(); }
}

// ═══════════════════════════════════════════════════════════════
//  PAGE MANAGEMENT
// ═══════════════════════════════════════════════════════════════

function addPage() {
  pages.push({ numeroPagina: pages.length + 1, testo: '', scelte: [] });
  save();
  render();
  // Scroll to new card
  setTimeout(() => {
    const cards = document.querySelectorAll('.page-card');
    cards[cards.length - 1]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function deletePage(i) {
  if (!confirm(`${txt('deletePage')} ${pages[i].numeroPagina}?`)) return;
  pages.splice(i, 1);
  renumber();
}

function duplicatePage(i) {
  const copy = JSON.parse(JSON.stringify(pages[i]));
  copy.numeroPagina = pages.length + 1;
  pages.splice(i + 1, 0, copy);
  renumber();
  toast(txt('pageDuplicated'), 'ok');
}

function renumber() {
  pages.forEach((p, i) => p.numeroPagina = i + 1);
  save();
  render();
}

function addChoice(pi) {
  pages[pi].scelte.push({ testo: '', vaiAllaPagina: 0 });
  save();
  renderCard(pi);
}

function deleteChoice(pi, ci) {
  pages[pi].scelte.splice(ci, 1);
  save();
  renderCard(pi);
}

// ═══════════════════════════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════════════════════════

function allNums() {
  return new Set(pages.map(p => p.numeroPagina));
}

function pageStatus(p) {
  const nums = allNums();
  if (p.scelte.length === 0) return 'endpoint';
  if (p.scelte.some(c => !c.vaiAllaPagina || !nums.has(Number(c.vaiAllaPagina)))) return 'broken';
  return 'ok';
}

// ═══════════════════════════════════════════════════════════════
//  RENDER — EDITOR
// ═══════════════════════════════════════════════════════════════

let dragFrom = null;

function render() {
  const container = document.getElementById('editor-panel');
  const btn = document.getElementById('add-page-btn');

  // Remove old cards
  container.querySelectorAll('.page-card').forEach(el => el.remove());

  pages.forEach((p, i) => renderCardAt(i, container, btn));

  updateBadge();
  doSearch();
}

function renderCard(i) {
  const container = document.getElementById('editor-panel');
  const existing = container.querySelectorAll('.page-card')[i];
  if (!existing) { render(); return; }
  const btn = document.getElementById('add-page-btn');
  const newCard = buildCard(i);
  container.insertBefore(newCard, existing);
  existing.remove();
  updateBadge();
}

function renderCardAt(i, container, btn) {
  container.insertBefore(buildCard(i), btn);
}

function buildCard(i) {
  const p = pages[i];
  const status = pageStatus(p);
  const nums = allNums();

  const card = document.createElement('div');
  card.className = 'page-card status-' + (status === 'ok' ? 'ok' : status === 'endpoint' ? 'warn' : 'err');
  card.dataset.index = i;
  card.draggable = true;

  // Drag
  card.addEventListener('dragstart', e => { dragFrom = i; e.dataTransfer.effectAllowed = 'move'; });
  card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    if (dragFrom === null || dragFrom === i) return;
    const moved = pages.splice(dragFrom, 1)[0];
    pages.splice(i, 0, moved);
    dragFrom = null;
    renumber();
  });

  // Status display
  const statusIcon = status === 'ok' ? '✓' : status === 'endpoint' ? '⚑' : '✕';
  const statusColor = status === 'ok' ? 'var(--ok)' : status === 'endpoint' ? 'var(--warn)' : 'var(--danger)';
  const statusLabel = status === 'ok' ? 'Valida' : status === 'endpoint' ? 'Fine percorso' : 'Link rotto';

  card.innerHTML = `
    <div class="card-header">
      <div class="page-num-badge">${p.numeroPagina}</div>
      <div class="status-pill" style="color:${statusColor}">
        <span>${statusIcon}</span> <span>${statusLabel}</span>
      </div>
      <div style="margin-left:auto;display:flex;gap:4px;align-items:center">
        <button class="btn btn-surface btn-sm" title="Duplica" onclick="duplicatePage(${i})">⧉</button>
        <button class="btn btn-danger btn-sm" title="Elimina" onclick="deletePage(${i})">🗑</button>
        <div class="drag-handle" title="Trascina per riordinare">⋮⋮</div>
      </div>
    </div>

    <textarea class="page-text" rows="3" placeholder="Testo della scena…"
      oninput="pages[${i}].testo=this.value;save();updateCardStatus(${i})">${escHtml(p.testo)}</textarea>

    <div class="choices-section" id="choices-${i}"></div>

    <button class="btn btn-info btn-sm" style="margin-top:6px" onclick="addChoice(${i})">
      ＋ Aggiungi scelta
    </button>
  `;

  // Render choices into the card
  const choicesDiv = card.querySelector(`#choices-${i}`);
  if (p.scelte.length > 0) {
    const label = document.createElement('div');
    label.className = 'choices-label';
    label.textContent = 'Scelte';
    choicesDiv.appendChild(label);
  }

  p.scelte.forEach((c, ci) => {
    const isBroken = c.vaiAllaPagina && !nums.has(Number(c.vaiAllaPagina));
    const cdiv = document.createElement('div');
    cdiv.className = 'choice';
    cdiv.innerHTML = `
      <span class="choice-arrow">→</span>
      <div class="choice-fields">
        <input class="choice-text" value="${escHtml(c.testo)}" placeholder="Testo della scelta…"
          oninput="pages[${i}].scelte[${ci}].testo=this.value;save()">
        <div class="choice-target-row">
          <span class="choice-target-label">→ Pag.</span>
          <input class="choice-target${isBroken ? ' broken' : ''}" type="number" min="1"
            value="${c.vaiAllaPagina || ''}" placeholder="?"
            oninput="pages[${i}].scelte[${ci}].vaiAllaPagina=parseInt(this.value)||0;save();updateCardStatus(${i});this.className='choice-target'+(pages[${i}].scelte[${ci}].vaiAllaPagina&&!allNums().has(pages[${i}].scelte[${ci}].vaiAllaPagina)?' broken':'')">
          ${isBroken ? `<span style="color:var(--danger);font-size:11px">pag. inesistente</span>` : ''}
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteChoice(${i},${ci})">✕</button>
    `;
    choicesDiv.appendChild(cdiv);
  });

  return card;
}

function updateCardStatus(i) {
  const container = document.getElementById('editor-panel');
  const card = container.querySelectorAll('.page-card')[i];
  if (!card) return;
  const status = pageStatus(pages[i]);
  card.className = 'page-card status-' + (status === 'ok' ? 'ok' : status === 'endpoint' ? 'warn' : 'err');
  updateBadge();
}

function updateBadge() {
  const broken = pages.filter(p => pageStatus(p) === 'broken').length;
  const badge = document.getElementById('issues-badge');
  badge.textContent = broken;
  badge.className = 'badge' + (broken > 0 ? ' show' : '');
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════════

function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.page-card');
  let matches = 0;

  cards.forEach((card, i) => {
    if (!q) {
      card.classList.remove('search-hidden', 'search-match');
      return;
    }
    const text = (pages[i]?.testo || '').toLowerCase();
    const choiceText = (pages[i]?.scelte || []).map(c => c.testo.toLowerCase()).join(' ');
    if (text.includes(q) || choiceText.includes(q)) {
      card.classList.remove('search-hidden');
      card.classList.add('search-match');
      matches++;
    } else {
      card.classList.add('search-hidden');
      card.classList.remove('search-match');
    }
  });

  document.getElementById('search-count').textContent =
    q ? `${matches} ${txt('searchFound')}` : '';
}

// ═══════════════════════════════════════════════════════════════
//  FIND & REPLACE
// ═══════════════════════════════════════════════════════════════

function openFindReplace() {
  const q = document.getElementById('search-input').value;
  document.getElementById('fr-find').value = q;
  document.getElementById('fr-replace').value = '';
  document.getElementById('fr-preview').textContent = '';
  openModal('modal-findreplace');
}

function doFindReplace(preview) {
  const find = document.getElementById('fr-find').value;
  const replace = document.getElementById('fr-replace').value;
  if (!find) return;

  let count = 0;
  pages.forEach(p => {
    const before = p.testo;
    const after = p.testo.split(find).join(replace);
    if (before !== after) { count += (before.split(find).length - 1); }
    if (!preview) p.testo = after;

    p.scelte.forEach(c => {
      const cb = c.testo;
      const ca = c.testo.split(find).join(replace);
      if (cb !== ca) { count += (cb.split(find).length - 1); }
      if (!preview) c.testo = ca;
    });
  });

  if (preview) {
    document.getElementById('fr-preview').textContent =
      count > 0 ? `Trovate ${count} occorrenze` : 'Nessuna occorrenza trovata';
  } else {
    save();
    render();
    closeModal('modal-findreplace');
    toast(`Sostituite ${count} occorrenze`, 'ok');
  }
}

// ═══════════════════════════════════════════════════════════════
//  JSON
// ═══════════════════════════════════════════════════════════════

function generateJSON() {
  return {
    titolo,
    ...(autore ? { autore } : {}),
    ...(anno ? { anno: Number(anno) } : {}),
    ...(genere ? { genere } : {}),
    ...(lingua ? { lingua } : {}),
    pagine: pages,
  };
}

function renderJson() {
  document.getElementById('json-output').value =
    JSON.stringify(generateJSON(), null, 2);
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(generateJSON(), null, 2));
  toast(txt('jsonCopied'), 'ok');
}

function downloadJSON() {
  const name = (titolo || 'storia').replace(/[^a-zA-Z0-9_\- ]/g, '').trim() || 'storia';
  const blob = new Blob([JSON.stringify(generateJSON(), null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name + '.json'; a.click();
  URL.revokeObjectURL(url);
  toast(txt('fileDownloaded'), 'ok');
}

// ═══════════════════════════════════════════════════════════════
//  IMPORT
// ═══════════════════════════════════════════════════════════════

function openImport() { openModal('modal-import'); }

function doImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById('import-json').value = reader.result;
  };
  reader.readAsText(file);
}

function doImportJson() {
  try {
    const raw = document.getElementById('import-json').value;
    const data = JSON.parse(raw);
    if (!data.pagine || !Array.isArray(data.pagine)) throw new Error(txt('importMissingPages'));
    pages = data.pagine;
    titolo = data.titolo || '';
    autore = data.autore || '';
    anno = data.anno || '';
    genere = data.genere || '';
    lingua = data.lingua || '';
    document.getElementById('f-titolo').value = titolo;
    document.getElementById('f-autore').value = autore;
    document.getElementById('f-anno').value = anno;
    document.getElementById('f-genere').value = genere;
    document.getElementById('f-lingua').value = lingua;
    save();
    render();
    closeModal('modal-import');
    toast(txt('storyImported'), 'ok');
  } catch (e) {
    toast(txt('invalidJson') + e.message, 'err');
  }
}

// ═══════════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════════

function renderStats() {
  const nums = allNums();
  const total = pages.length;
  const ends = pages.filter(p => p.scelte.length === 0);
  const brokenPages = pages.filter(p => pageStatus(p) === 'broken');
  const allChoices = pages.flatMap(p => p.scelte);
  const words = pages.map(p => (p.testo || '').trim().split(/\s+/).filter(Boolean).length).reduce((a,b) => a+b, 0);

  // Reachability from page 1
  const reachable = new Set();
  const start = pages.find(p => p.numeroPagina === 1);
  if (start) {
    const queue = [1];
    while (queue.length) {
      const n = queue.shift();
      if (reachable.has(n)) continue;
      reachable.add(n);
      const pg = pages.find(p => p.numeroPagina === n);
      pg?.scelte.forEach(c => { if (c.vaiAllaPagina) queue.push(Number(c.vaiAllaPagina)); });
    }
  }
  const unreachable = pages.filter(p => !reachable.has(p.numeroPagina));

  // Issues
  const issues = [];
  brokenPages.forEach(p => {
    p.scelte.filter(c => c.vaiAllaPagina && !nums.has(Number(c.vaiAllaPagina))).forEach(c => {
      issues.push({ type: 'err', page: p.numeroPagina, msg: `Pag. ${p.numeroPagina}: scelta "${c.testo || '?'}" punta alla pag. ${c.vaiAllaPagina} che non esiste` });
    });
  });
  unreachable.forEach(p => {
    issues.push({ type: 'warn', page: p.numeroPagina, msg: `Pag. ${p.numeroPagina}: non raggiungibile dalla pagina 1` });
  });
  pages.filter(p => !p.testo?.trim()).forEach(p => {
    issues.push({ type: 'warn', page: p.numeroPagina, msg: `Pag. ${p.numeroPagina}: testo vuoto` });
  });

  // Render stats grid
  document.getElementById('stats-grid').innerHTML = [
    { label: 'Pagine totali', value: total, sub: '' },
    { label: 'Finali', value: ends.length, sub: 'pagine senza scelte' },
    { label: 'Scelte totali', value: allChoices.length, sub: `~ ${total > 0 ? (allChoices.length/total).toFixed(1) : 0} per pagina` },
    { label: 'Link rotti', value: brokenPages.length, sub: '' },
    { label: 'Non raggiungibili', value: unreachable.length, sub: 'dalla pagina 1' },
    { label: 'Parole', value: words, sub: 'nel testo delle pagine' },
    { label: 'Profondità max', value: computeMaxDepth(), sub: 'dal nodo radice' },
    { label: 'Pagine raggiunte', value: reachable.size, sub: `su ${total}` },
  ].map(s => `
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      ${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ''}
    </div>
  `).join('');

  // Render issues
  const issuesList = document.getElementById('issues-list');
  if (issues.length === 0) {
    issuesList.innerHTML = `<div style="color:var(--ok);font-size:14px;padding:12px">✓ Nessun problema rilevato</div>`;
  } else {
    issuesList.innerHTML = issues.map(iss => `
      <div class="issue-item" onclick="jumpToPage(${iss.page})">
        <div class="issue-dot ${iss.type}"></div>
        <div class="issue-text">${iss.msg}</div>
        <span style="color:var(--text3);font-size:11px">→</span>
      </div>
    `).join('');
  }

  // Update badge
  const errCount = issues.filter(i => i.type === 'err').length;
  document.getElementById('issues-badge').textContent = errCount;
  document.getElementById('issues-badge').className = 'badge' + (errCount > 0 ? ' show' : '');
}

function computeMaxDepth() {
  if (pages.length === 0) return 0;
  const visited = new Set();
  let max = 0;
  function dfs(num, depth) {
    if (visited.has(num) || depth > 999) return;
    visited.add(num);
    max = Math.max(max, depth);
    const pg = pages.find(p => p.numeroPagina === num);
    pg?.scelte.forEach(c => { if (c.vaiAllaPagina) dfs(Number(c.vaiAllaPagina), depth + 1); });
    visited.delete(num);
  }
  dfs(1, 0);
  return max;
}

function jumpToPage(num) {
  switchTab('editor');
  setTimeout(() => {
    const idx = pages.findIndex(p => p.numeroPagina === num);
    if (idx < 0) return;
    const card = document.querySelectorAll('.page-card')[idx];
    card?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card?.classList.add('search-match');
    setTimeout(() => card?.classList.remove('search-match'), 2000);
  }, 100);
}

// ═══════════════════════════════════════════════════════════════
//  GRAPH
// ═══════════════════════════════════════════════════════════════

const G = {
  nodes: [],      // { id, x, y, vx, vy }
  zoom: 1,
  panX: 0,
  panY: 0,
  dragging: null,
  panning: false,
  lastMouse: null,
  animId: null,
  hoveredNode: null,
};

function renderGraph() {
  const canvas = document.getElementById('graph-canvas');
  const parent = document.getElementById('graph-panel');
  canvas.width = parent.clientWidth;
  canvas.height = parent.clientHeight;

  // Update stats bar
  const nums = allNums();
  const ends = pages.filter(p => p.scelte.length === 0);
  const broken = pages.filter(p => pageStatus(p) === 'broken');
  document.getElementById('g-pages').textContent = pages.length;
  document.getElementById('g-choices').textContent = pages.flatMap(p => p.scelte).length;
  document.getElementById('g-ends').textContent = ends.length;
  document.getElementById('g-broken').textContent = broken.length;

  // Build nodes preserving existing positions
  const existingPos = {};
  G.nodes.forEach(n => { existingPos[n.id] = { x: n.x, y: n.y }; });

  G.nodes = pages.map(p => {
    const pos = existingPos[p.numeroPagina];
    return {
      id: p.numeroPagina,
      x: pos ? pos.x : canvas.width / 2 + (Math.random() - .5) * 300,
      y: pos ? pos.y : canvas.height / 2 + (Math.random() - .5) * 300,
      vx: 0,
      vy: 0,
    };
  });

  if (!existingPos[pages[0]?.numeroPagina]) {
    graphLayout();
    return;
  }

  startGraphLoop();
  attachGraphEvents();
}

function graphLayout() {
  const canvas = document.getElementById('graph-canvas');
  if (!canvas.width) return;

  // Hierarchical layout using BFS from node 1
  const levels = {};
  const visited = new Set();
  const queue = [{ id: 1, level: 0 }];
  let maxLevel = 0;

  while (queue.length) {
    const { id, level } = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    if (!levels[level]) levels[level] = [];
    levels[level].push(id);
    maxLevel = Math.max(maxLevel, level);
    const pg = pages.find(p => p.numeroPagina === id);
    pg?.scelte.forEach(c => {
      if (c.vaiAllaPagina && !visited.has(Number(c.vaiAllaPagina))) {
        queue.push({ id: Number(c.vaiAllaPagina), level: level + 1 });
      }
    });
  }

  // Place unreachable nodes at the bottom
  const unreachable = pages.filter(p => !visited.has(p.numeroPagina));
  if (unreachable.length) {
    levels[maxLevel + 1] = unreachable.map(p => p.numeroPagina);
    maxLevel++;
  }

  const W = canvas.width;
  const H = canvas.height;
  const levelH = Math.min(120, (H - 80) / (maxLevel + 1));
  const nodeMap = {};

  Object.entries(levels).forEach(([lvl, ids]) => {
    const y = 60 + Number(lvl) * levelH;
    const gap = W / (ids.length + 1);
    ids.forEach((id, i) => {
      nodeMap[id] = { x: gap * (i + 1), y };
    });
  });

  G.nodes.forEach(n => {
    if (nodeMap[n.id]) { n.x = nodeMap[n.id].x; n.y = nodeMap[n.id].y; }
    n.vx = 0; n.vy = 0;
  });

  G.zoom = 1; G.panX = 0; G.panY = 0;
  startGraphLoop();
  attachGraphEvents();
}

function startGraphLoop() {
  if (G.animId) cancelAnimationFrame(G.animId);
  let tick = 0;
  function loop() {
    if (currentTab !== 'graph') return;
    tick++;
    if (tick < 200) runForces();
    drawGraph();
    G.animId = requestAnimationFrame(loop);
  }
  G.animId = requestAnimationFrame(loop);
}

function runForces() {
  const REPULSE = 4000;
  const SPRING = 0.04;
  const SPRING_LEN = 120;
  const DAMP = 0.85;
  const GRAVITY = 0.01;

  const nMap = {};
  G.nodes.forEach(n => { nMap[n.id] = n; });

  // Repulsion
  for (let i = 0; i < G.nodes.length; i++) {
    for (let j = i + 1; j < G.nodes.length; j++) {
      const a = G.nodes[i], b = G.nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d2 = Math.max(1, dx*dx + dy*dy);
      const f = REPULSE / d2;
      const d = Math.sqrt(d2);
      a.vx += f * dx / d; a.vy += f * dy / d;
      b.vx -= f * dx / d; b.vy -= f * dy / d;
    }
  }

  // Spring (edges)
  pages.forEach(p => {
    const a = nMap[p.numeroPagina];
    if (!a) return;
    p.scelte.forEach(c => {
      const b = nMap[Number(c.vaiAllaPagina)];
      if (!b) return;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.max(1, Math.sqrt(dx*dx + dy*dy));
      const f = SPRING * (d - SPRING_LEN);
      const fx = f * dx / d, fy = f * dy / d;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    });
  });

  const canvas = document.getElementById('graph-canvas');
  const cx = canvas.width / 2, cy = canvas.height / 2;

  G.nodes.forEach(n => {
    if (G.dragging === n.id) return;
    n.vx = (n.vx + GRAVITY * (cx - n.x)) * DAMP;
    n.vy = (n.vy + GRAVITY * (cy - n.y)) * DAMP;
    n.x += n.vx;
    n.y += n.vy;
  });
}

function drawGraph() {
  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const nums = allNums();

  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(G.panX, G.panY);
  ctx.scale(G.zoom, G.zoom);

  const nMap = {};
  G.nodes.forEach(n => { nMap[n.id] = n; });

  // Draw edges
  pages.forEach(p => {
    const from = nMap[p.numeroPagina];
    if (!from) return;
    p.scelte.forEach(c => {
      const to = nMap[Number(c.vaiAllaPagina)];
      const broken = c.vaiAllaPagina && !nums.has(Number(c.vaiAllaPagina));
      const color = broken ? '#ef4444' : 'rgba(99,102,241,0.45)';
      drawArrow(ctx, from.x, from.y, to ? to.x : from.x + 80, to ? to.y : from.y + 30, color, broken);
    });
  });

  // Draw nodes
  G.nodes.forEach(n => {
    const p = pages.find(pg => pg.numeroPagina === n.id);
    const status = p ? pageStatus(p) : 'ok';
    const isStart = n.id === 1;
    const isHovered = G.hoveredNode === n.id;

    const r = isStart ? 26 : 20;
    const fillColor = isStart ? '#6366f1'
      : '#1e293b';
    const strokeColor = isStart ? '#6366f1'
      : status === 'ok' ? '#22c55e'
      : status === 'endpoint' ? '#f59e0b'
      : '#ef4444';

    // Shadow for hovered
    if (isHovered) {
      ctx.save();
      ctx.shadowColor = strokeColor;
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 2, 0, Math.PI * 2);
      ctx.fillStyle = strokeColor + '22';
      ctx.fill();
      ctx.restore();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = fillColor;
    ctx.fill();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = isStart ? 2.5 : 2;
    ctx.stroke();

    // Node label
    ctx.fillStyle = isStart ? '#ffffff' : '#f8fafc';
    ctx.font = `${isStart ? 'bold ' : ''}${r > 22 ? '13' : '12'}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.id, n.x, n.y);

    // Mini text preview below
    if (isHovered && p) {
      const preview = (p.testo || '').slice(0, 30) + (p.testo?.length > 30 ? '…' : '');
      ctx.fillStyle = '#8b95a8';
      ctx.font = '10px system-ui';
      ctx.fillText(preview, n.x, n.y + r + 12);
    }
  });

  ctx.restore();
}

function drawArrow(ctx, x1, y1, x2, y2, color, dashed) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const arrowLen = 10;
  const targetR = 20;

  // Shorten to node edge
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 2) return;

  const ex = x2 - Math.cos(angle) * targetR;
  const ey = y2 - Math.sin(angle) * targetR;

  ctx.beginPath();
  if (dashed) ctx.setLineDash([5, 4]);
  else ctx.setLineDash([]);
  ctx.moveTo(x1 + Math.cos(angle) * 20, y1 + Math.sin(angle) * 20);
  ctx.lineTo(ex, ey);
  ctx.strokeStyle = color;
  ctx.lineWidth = dashed ? 1.5 : 1.5;
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - arrowLen * Math.cos(angle - 0.4), ey - arrowLen * Math.sin(angle - 0.4));
  ctx.lineTo(ex - arrowLen * Math.cos(angle + 0.4), ey - arrowLen * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

// ── Graph interaction ──────────────────────────────────────────────────────

let graphEventsAttached = false;

function attachGraphEvents() {
  if (graphEventsAttached) return;
  graphEventsAttached = true;
  const canvas = document.getElementById('graph-canvas');

  function worldPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left - G.panX) / G.zoom;
    const cy = (e.clientY - rect.top - G.panY) / G.zoom;
    return { x: cx, y: cy };
  }

  function nodeAt(wx, wy) {
    return G.nodes.find(n => {
      const dx = n.x - wx, dy = n.y - wy;
      return Math.sqrt(dx*dx + dy*dy) < 24;
    });
  }

  canvas.addEventListener('mousedown', e => {
    const wp = worldPos(e);
    const n = nodeAt(wp.x, wp.y);
    if (n) { G.dragging = n.id; canvas.style.cursor = 'grabbing'; }
    else { G.panning = true; G.lastMouse = { x: e.clientX, y: e.clientY }; canvas.style.cursor = 'grabbing'; }
  });

  canvas.addEventListener('mousemove', e => {
    const wp = worldPos(e);
    const n = nodeAt(wp.x, wp.y);
    G.hoveredNode = n ? n.id : null;

    const tt = document.getElementById('graph-tooltip');
    if (n) {
      const pg = pages.find(p => p.numeroPagina === n.id);
      const rect = canvas.getBoundingClientRect();
      tt.style.display = 'block';
      tt.style.left = (e.clientX - rect.left + 12) + 'px';
      tt.style.top = (e.clientY - rect.top - 10) + 'px';
      tt.innerHTML = `<b>Pagina ${n.id}</b><br>${(pg?.testo || '—').slice(0, 80)}${(pg?.testo?.length > 80) ? '…' : ''}<br><span style="color:var(--text3)">${pg?.scelte?.length || 0} scelte</span>`;
      canvas.style.cursor = 'pointer';
    } else {
      tt.style.display = 'none';
      if (!G.dragging && !G.panning) canvas.style.cursor = 'grab';
    }

    if (G.dragging !== null) {
      const node = G.nodes.find(nd => nd.id === G.dragging);
      if (node) { node.x = wp.x; node.y = wp.y; node.vx = 0; node.vy = 0; }
    } else if (G.panning && G.lastMouse) {
      G.panX += e.clientX - G.lastMouse.x;
      G.panY += e.clientY - G.lastMouse.y;
      G.lastMouse = { x: e.clientX, y: e.clientY };
    }
  });

  canvas.addEventListener('mouseup', e => {
    if (G.dragging !== null) {
      // Double-click on node → jump to editor
    }
    G.dragging = null;
    G.panning = false;
    G.lastMouse = null;
    canvas.style.cursor = 'grab';
  });

  canvas.addEventListener('dblclick', e => {
    const wp = worldPos(e);
    const n = nodeAt(wp.x, wp.y);
    if (n) jumpToPage(n.id);
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    G.panX = mx - (mx - G.panX) * delta;
    G.panY = my - (my - G.panY) * delta;
    G.zoom *= delta;
    G.zoom = Math.max(0.2, Math.min(4, G.zoom));
  }, { passive: false });

  // Touch support
  let lastTouchDist = 0;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      const wp = worldPos(t);
      const n = nodeAt(wp.x, wp.y);
      if (n) G.dragging = n.id;
      else { G.panning = true; G.lastMouse = { x: t.clientX, y: t.clientY }; }
    }
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx*dx + dy*dy);
    }
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (lastTouchDist) {
        G.zoom *= dist / lastTouchDist;
        G.zoom = Math.max(0.2, Math.min(4, G.zoom));
      }
      lastTouchDist = dist;
      return;
    }
    const t = e.touches[0];
    const wp = worldPos(t);
    if (G.dragging !== null) {
      const node = G.nodes.find(n => n.id === G.dragging);
      if (node) { node.x = wp.x; node.y = wp.y; }
    } else if (G.panning && G.lastMouse) {
      G.panX += t.clientX - G.lastMouse.x;
      G.panY += t.clientY - G.lastMouse.y;
      G.lastMouse = { x: t.clientX, y: t.clientY };
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => { G.dragging = null; G.panning = false; lastTouchDist = 0; });
}

function graphZoomIn() { G.zoom = Math.min(4, G.zoom * 1.2); }
function graphZoomOut() { G.zoom = Math.max(0.2, G.zoom / 1.2); }
function graphReset() {
  G.zoom = 1; G.panX = 0; G.panY = 0;
  const canvas = document.getElementById('graph-canvas');
  G.nodes.forEach(n => { n.vx = 0; n.vy = 0; });
}

// ═══════════════════════════════════════════════════════════════
//  MODALS / TOAST
// ═══════════════════════════════════════════════════════════════

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2600);
}

// ═══════════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════════

window.addEventListener('resize', () => {
  if (currentTab === 'graph') {
    const canvas = document.getElementById('graph-canvas');
    const parent = document.getElementById('graph-panel');
    canvas.width = parent.clientWidth;
    canvas.height = parent.clientHeight;
  }
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════

render();
</script>
